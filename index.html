<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runner Game</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  overflow: hidden;
  color: white;
}

/* SCREENS */
.screen {
  position: fixed;
  width: 100%;
  height: 100%;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 15px;
}

/* BUTTONS */
button {
  padding: 14px 22px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  transition: 0.15s;
}

button:active {
  transform: scale(0.9);
  opacity: 0.7;
}

/* GAME CANVAS */
canvas {
  display: none;
  border: 2px solid white;
  margin: 0 auto;
}

/* CONTROLS */
#jumpBtn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  display: none;
  z-index: 10;
}

#shieldBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: none;
  z-index: 10;
}

#startBtn {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  display: none;
  z-index: 10;
}
</style>
</head>

<body>

<!-- MAIN MENU -->
<div id="main" class="screen" style="display:flex;">
  <button onclick="startGame()">PLAY</button>
  <button onclick="show('settings')">SETTINGS</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
  <button onclick="show('player')">Change Player</button>
  <button onclick="show('color')">Change Color</button>
  <button onclick="show('text')">Change Text</button>
  <button onclick="show('main')">BACK</button>
</div>

<!-- PLAYER -->
<div id="player" class="screen">
  <button onclick="setShape('square')">SQUARE</button>
  <button onclick="setShape('circle')">CIRCLE</button>
  <button onclick="setShape('triangle')">TRIANGLE</button>
  <button onclick="setShape('heart')">HEART</button>
  <button onclick="show('settings')">BACK</button>
</div>

<!-- COLOR -->
<div id="color" class="screen">
  <button style="background:red" onclick="setColor('red')">RED</button>
  <button style="background:blue" onclick="setColor('blue')">BLUE</button>
  <button style="background:green" onclick="setColor('green')">GREEN</button>
  <button style="background:yellow;color:black" onclick="setColor('yellow')">YELLOW</button>
  <button style="background:white;color:black" onclick="setColor('white')">WHITE</button>
  <button onclick="show('settings')">BACK</button>
</div>

<!-- TEXT -->
<div id="text" class="screen">
  <input id="textInput" placeholder="Enter text">
  <button onclick="saveText()">SAVE</button>
  <button onclick="show('settings')">BACK</button>
  <p id="msg"></p>
</div>

<!-- GAME -->
<canvas id="game" width="400" height="500"></canvas>

<button id="jumpBtn" onclick="jump()">JUMP</button>
<button id="shieldBtn" onclick="shield()">SHIELD</button>
<button id="startBtn" onclick="restart()">START</button>

<script>

/* SCREEN CONTROL (SAFE) */
function show(id){
  const screens = ["main","settings","player","color","text"];

  screens.forEach(s=>{
    document.getElementById(s).style.display = "none";
  });

  if(id){
    document.getElementById(id).style.display = "flex";
  }
}

/* SETTINGS */
let settings = {
  shape:"square",
  color:"red",
  text:"SXJ"
};

function setShape(s){ settings.shape=s; }
function setColor(c){ settings.color=c; }

function saveText(){
  let v = document.getElementById("textInput").value;
  if(v.trim() !== ""){
    settings.text = v.toUpperCase();
    document.getElementById("msg").innerText = "SAVED ✔";
    setTimeout(()=>document.getElementById("msg").innerText="",1000);
  }
}

/* GAME STATE */
let canvas, ctx;
let player, spikes = [];
let running = false;
let timer = 0;
let shieldActive = false;

/* START GAME */
function startGame(){
  show("");

  canvas = document.getElementById("game");
  ctx = canvas.getContext("2d");

  canvas.style.display = "block";
  document.getElementById("jumpBtn").style.display = "block";
  document.getElementById("shieldBtn").style.display = "block";
  document.getElementById("startBtn").style.display = "none";

  player = {x:50,y:400,vy:0,jumping:false};
  spikes = [];
  timer = 0;
  running = true;
}

/* RESTART */
function restart(){
  canvas.style.display = "none";
  document.getElementById("jumpBtn").style.display = "none";
  document.getElementById("shieldBtn").style.display = "none";
  document.getElementById("startBtn").style.display = "none";
  show("main");
}

/* CONTROLS */
function jump(){
  if(!player.jumping){
    player.vy = -12;
    player.jumping = true;
  }
}

function shield(){
  shieldActive = true;
  setTimeout(()=>shieldActive=false, 1000);
}

/* DRAW PLAYER */
function drawPlayer(){
  ctx.fillStyle = shieldActive ? "cyan" : settings.color;

  ctx.fillRect(player.x, player.y, 30, 30);

  ctx.fillStyle = "white";
  ctx.fillText(settings.text, player.x, player.y - 5);
}

/* GAME LOOP */
function loop(){
  if(!ctx) return;

  ctx.clearRect(0,0,400,500);

  if(running){

    player.vy += 0.6;
    player.y += player.vy;

    if(player.y > 400){
      player.y = 400;
      player.vy = 0;
      player.jumping = false;
    }

    // OBSTACLES (FIXED SPACING)
    timer++;
    if(timer > 130){
      spikes.push({x:400});
      timer = 0;
    }

    for(let s of spikes){
      s.x -= 3;

      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.moveTo(s.x,430);
      ctx.lineTo(s.x+15,400);
      ctx.lineTo(s.x+30,430);
      ctx.fill();

      if(
        s.x < player.x+30 &&
        s.x+30 > player.x &&
        player.y > 370
      ){
        if(!shieldActive){
          running = false;
          document.getElementById("startBtn").style.display = "block";
        }
      }
    }

    spikes = spikes.filter(s => s.x > -50);

    drawPlayer();

  } else {
    ctx.fillStyle = "white";
    ctx.fillText("GAME OVER",150,250);
  }

  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
