<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Runner</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
  color: white;
}

/* CANVAS */
canvas {
  display: none;
  background: black;
}

/* MENU */
#menu {
  position: fixed;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 15px;
  z-index: 5;
}

/* SCORE */
#score {
  position: fixed;
  top: 10px;
  right: 10px;
  font-size: 20px;
  display: none;
  z-index: 10;
}

/* BUTTONS */
#jumpBtn, #shieldBtn {
  position: fixed;
  bottom: 20px;
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  display: none;
  z-index: 10;
}

#jumpBtn { left: 20px; }
#shieldBtn { right: 20px; }

/* RESTART TOP CENTER */
#restartBtn {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  color: black;
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  display: none;
  z-index: 20;
}

/* GAME OVER SCREEN */
#gameOver {
  position: fixed;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: rgba(0,0,0,0.6);
  z-index: 30;
}

#gameOverText {
  font-size: 40px;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<!-- MENU SCREEN -->
<div id="menu">
  <h1>SPACE RUNNER</h1>
  <button onclick="startGame()">PLAY</button>
</div>

<canvas id="game" width="400" height="500"></canvas>

<div id="score">Score: 0</div>

<button id="jumpBtn" onclick="jump()">JUMP</button>
<button id="shieldBtn" onclick="shield()">SHIELD</button>
<button id="restartBtn" onclick="startGame()">RESTART</button>

<div id="gameOver">
  <div id="gameOverText">GAME OVER</div>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, enemies=[];
let running=false;
let score=0;
let scoreTick=0;
let spawnTimer=0;

/* START GAME */
function startGame(){

  document.getElementById("menu").style.display="none";
  document.getElementById("gameOver").style.display="none";

  canvas.style.display="block";
  document.getElementById("score").style.display="block";
  document.getElementById("jumpBtn").style.display="block";
  document.getElementById("shieldBtn").style.display="block";
  document.getElementById("restartBtn").style.display="none";

  player = {x:50,y:400,vy:0,prevY:400,jumping:false};
  enemies = [];

  score = 0;
  scoreTick = 0;
  spawnTimer = 0;

  running = true;
}

/* CONTROLS */
function jump(){
  if(!player.jumping){
    player.vy = -12;
    player.jumping = true;
  }
}

function shield(){}

/* SPAWN */
function spawnEnemy(){
  enemies.push({x:400,alive:true});
}

/* GAME OVER */
function gameOver(){
  running = false;
  document.getElementById("gameOver").style.display="flex";
  document.getElementById("restartBtn").style.display="block";
}

/* LOOP */
function loop(){

ctx.clearRect(0,0,400,500);

if(!player){requestAnimationFrame(loop);return;}

if(running){

  /* SCORE = 1 PER SECOND */
  scoreTick++;
  if(scoreTick >= 60){
    score++;
    scoreTick = 0;
  }

  document.getElementById("score").innerText = "Score: " + score;

  /* PLAYER */
  player.prevY = player.y;

  player.vy += 0.6;
  player.y += player.vy;

  if(player.y > 400){
    player.y = 400;
    player.vy = 0;
    player.jumping = false;
  }

  /* SPAWN */
  spawnTimer++;
  if(spawnTimer > 100){
    spawnEnemy();
    spawnTimer = 0;
  }

  /* ENEMIES */
  for(let e of enemies){

    if(!e.alive) continue;

    e.x -= 3;

    ctx.fillStyle="orange";
    ctx.fillRect(e.x,400,30,30);

    let enemyTop = 400;

    let falling = player.vy > 0;
    let wasAbove = player.prevY + 30 <= enemyTop;

    if(player.x < e.x+30 && player.x+30 > e.x){

      if(falling && wasAbove){
        e.alive = false;
        player.vy = -8;
        score += 5;
      } else {
        gameOver();
      }
    }
  }

  enemies = enemies.filter(e => e.x > -100 && e.alive);

  /* PLAYER */
  ctx.fillStyle="lime";
  ctx.fillRect(player.x,player.y,30,30);

}else{

  ctx.fillStyle="white";
  ctx.font="30px Arial";
  ctx.fillText("GAME OVER",120,250);
}

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
