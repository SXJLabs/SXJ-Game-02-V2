<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runner Game</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
  color: white;
}

/* MENU */
.screen {
  position: fixed;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 15px;
}

/* BUTTONS */
button {
  padding: 14px 22px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
}

/* GAME AREA */
canvas {
  display: none;
  border: 2px solid white;
  margin: 0 auto;
}

/* CONTROLS */
#jumpBtn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  display: none;
  z-index: 10;
}

#shieldBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: none;
  z-index: 10;
}

#restartBtn {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  display: none;
  z-index: 10;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen">
  <button onclick="startGame()">PLAY</button>
</div>

<!-- GAME -->
<canvas id="game" width="400" height="500"></canvas>

<button id="jumpBtn" onclick="jump()">JUMP</button>
<button id="shieldBtn" onclick="toggleShield()">SHIELD</button>
<button id="restartBtn" onclick="restart()">START</button>

<script>

let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let player, obstacles = [];
let running = false;
let timer = 0;
let shield = false;

/* START GAME */
function startGame(){
  document.getElementById("menu").style.display = "none";

  canvas.style.display = "block";
  document.getElementById("jumpBtn").style.display = "block";
  document.getElementById("shieldBtn").style.display = "block";
  document.getElementById("restartBtn").style.display = "none";

  player = {
    x: 50,
    y: 400,
    vy: 0,
    jumping: false
  };

  obstacles = [];
  timer = 0;
  shield = false;
  running = true;
}

/* RESTART */
function restart(){
  canvas.style.display = "none";
  document.getElementById("jumpBtn").style.display = "none";
  document.getElementById("shieldBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("menu").style.display = "flex";
}

/* JUMP */
function jump(){
  if(!player.jumping){
    player.vy = -12;
    player.jumping = true;
  }
}

/* SHIELD */
function toggleShield(){
  shield = true;
  setTimeout(()=>shield=false, 1200); // temporary shield
}

/* LOOP */
function loop(){
  ctx.clearRect(0,0,400,500);

  if(running){

    // gravity
    player.vy += 0.6;
    player.y += player.vy;

    if(player.y > 400){
      player.y = 400;
      player.vy = 0;
      player.jumping = false;
    }

    // SPAWN OBSTACLES (FIXED SPACING)
    timer++;
    if(timer > 120){ // slower = more space
      obstacles.push({x:400});
      timer = 0;
    }

    // DRAW OBSTACLES
    for(let o of obstacles){
      o.x -= 3;

      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.moveTo(o.x,430);
      ctx.lineTo(o.x+15,400);
      ctx.lineTo(o.x+30,430);
      ctx.fill();

      // COLLISION
      if(
        o.x < player.x+30 &&
        o.x+30 > player.x &&
        player.y > 370
      ){
        if(!shield){
          running = false;
          document.getElementById("restartBtn").style.display = "block";
        }
      }
    }

    obstacles = obstacles.filter(o => o.x > -50);

    // PLAYER
    ctx.fillStyle = shield ? "cyan" : "white";
    ctx.fillRect(player.x, player.y, 30, 30);

  } else {
    ctx.fillStyle = "white";
    ctx.fillText("GAME OVER", 150, 250);
  }

  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
