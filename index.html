<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Runner</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
  color: white;
}

.screen {
  position: fixed;
  width: 100%;
  height: 100%;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 12px;
}

button {
  padding: 14px 20px;
  border-radius: 10px;
  border: none;
}

button:active {
  transform: scale(0.9);
  opacity: 0.6;
}

.backBtn {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

canvas {
  display: none;
  background: black;
}

#jumpBtn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  display: none;
}

#shieldBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: none;
}

#restartBtn {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  display: none;
  font-size: 20px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen" style="display:flex;">
  <button onclick="startGame()">PLAY</button>
</div>

<canvas id="game" width="400" height="500"></canvas>

<button id="jumpBtn" onclick="jump()">JUMP</button>
<button id="shieldBtn" onclick="shield()">SHIELD</button>
<button id="restartBtn" onclick="restartGame()">RESTART</button>

<script>

/* STATE */
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let player, objects=[], bullets=[];
let running=false;
let timer=0;
let pattern=0;
let shieldActive=false;
let score=0;

/* SOUND */
function beep(freq,duration){
  let ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctxAudio.createOscillator();
  let gain = ctxAudio.createGain();

  osc.connect(gain);
  gain.connect(ctxAudio.destination);

  osc.frequency.value = freq;
  osc.start();
  osc.stop(ctxAudio.currentTime + duration/1000);
}

/* SCREEN */
function show(id){
  document.getElementById("menu").style.display="none";
}

/* START GAME */
function startGame(){

  document.getElementById("menu").style.display="none";

  canvas.style.display="block";
  document.getElementById("jumpBtn").style.display="block";
  document.getElementById("shieldBtn").style.display="block";

  player={x:50,y:400,vy:0,jumping:false,w:30,h:30};

  objects=[];
  bullets=[];
  timer=0;
  pattern=0;
  score=0;
  running=true;

  beep(600,100);
}

/* RESTART */
function restartGame(){
  document.getElementById("restartBtn").style.display="none";
  startGame();
}

/* CONTROLS */
function jump(){
  if(!player.jumping){
    player.vy=-12;
    player.jumping=true;
    beep(800,80);
  }
}

function shield(){
  shieldActive=true;
  setTimeout(()=>shieldActive=false,1200);
  beep(300,120);
}

/* SPAWN */
function spawn(){
  let t=pattern%5;

  if(t===0) objects.push({type:"spike",x:400});
  if(t===1) objects.push({type:"spike",x:460});
  if(t===3) objects.push({type:"enemy",x:400,cd:0,name:"SHAN"});
  if(t===4) objects.push({type:"enemy",x:400,cd:0,name:"RAJEEN"});

  pattern++;
}

/* COLLISION */
function hit(a,b){
  return (
    a.x < b.x+b.w &&
    a.x+a.w > b.x &&
    a.y < b.y+b.h &&
    a.y+a.h > b.y
  );
}

/* LOOP */
function loop(){

ctx.clearRect(0,0,400,500);

if(!player){requestAnimationFrame(loop);return;}

if(running){

  /* SCORE */
  score += 1;

  player.vy+=0.6;
  player.y+=player.vy;

  if(player.y>400){
    player.y=400;
    player.vy=0;
    player.jumping=false;
  }

  timer++;
  if(timer>140){
    spawn();
    timer=0;
  }

  for(let o of objects){
    o.x-=2.5;

    if(o.type==="spike"){
      ctx.fillStyle="red";
      ctx.beginPath();
      ctx.moveTo(o.x,430);
      ctx.lineTo(o.x+15,400);
      ctx.lineTo(o.x+30,430);
      ctx.fill();

      let box={x:o.x,y:400,w:30,h:30};

      if(hit(player,box)&&!shieldActive){
        gameOver();
      }
    }

    if(o.type==="enemy"){
      ctx.fillStyle="orange";
      ctx.fillRect(o.x,380,30,30);

      o.cd++;
      if(o.cd>60){
        bullets.push({x:o.x,y:400,w:5,h:5});
        o.cd=0;
      }

      ctx.fillStyle="white";
      ctx.fillText(o.name,o.x,370);
    }
  }

  for(let b of bullets){
    b.x-=4;
    ctx.fillStyle="yellow";
    ctx.fillRect(b.x,b.y,5,5);

    if(hit(player,b)&&!shieldActive){
      gameOver();
    }
  }

  objects=objects.filter(o=>o.x>-100);
  bullets=bullets.filter(b=>b.x>-100);

  /* PLAYER */
  ctx.fillStyle="lime";
  ctx.fillRect(player.x,player.y,30,30);

  /* SCORE TEXT */
  ctx.fillStyle="white";
  ctx.font="16px Arial";
  ctx.fillText("Score: " + score,10,20);

}else{
  ctx.fillStyle="white";
  ctx.font="30px Arial";
  ctx.fillText("GAME OVER",110,250);
}

requestAnimationFrame(loop);
}

/* GAME OVER */
function gameOver(){
  running=false;
  document.getElementById("restartBtn").style.display="block";
  beep(150,300);
}

loop();

</script>

</body>
</html>
