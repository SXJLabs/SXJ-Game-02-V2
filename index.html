<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SXJ Runner</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
  overflow: hidden;
}

.menu {
  position: fixed;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
}

.hidden { display: none; }

button {
  padding: 14px 22px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
}

/* CANVAS */
canvas {
  display: none;
  margin: 60px auto 0;
  border: 2px solid white;
}

/* GAME BUTTONS */
#jumpBtn {
  display: none;
  position: fixed;
  bottom: 30px;
  left: 20px;
  padding: 18px;
}

/* START BUTTON */
#startBtn {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 20px;
  font-size: 20px;
  display: none;
}

/* COLOR BUTTON STYLE */
.colorBtn {
  width: 100px;
  padding: 10px;
  color: black;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- MAIN MENU -->
<div id="mainMenu" class="menu">
  <button onclick="startGame()">PLAY</button>
  <button onclick="openSettings()">SETTINGS</button>
</div>

<!-- SETTINGS MAIN -->
<div id="settingsMenu" class="menu hidden">
  <button onclick="openSub('player')">Change Player</button>
  <button onclick="openSub('color')">Change Color</button>
  <button onclick="openSub('text')">Change Text</button>
  <button onclick="backToMain()">BACK</button>
</div>

<!-- PLAYER -->
<div id="playerMenu" class="menu hidden">
  <button onclick="setShape('square')">SQUARE</button>
  <button onclick="setShape('circle')">CIRCLE</button>
  <button onclick="setShape('triangle')">TRIANGLE</button>
  <button onclick="setShape('heart')">HEART</button>
  <button onclick="backToSettings()">BACK</button>
</div>

<!-- COLOR -->
<div id="colorMenu" class="menu hidden">
  <button class="colorBtn" style="background:red" onclick="setColor('red')">RED</button>
  <button class="colorBtn" style="background:blue" onclick="setColor('blue')">BLUE</button>
  <button class="colorBtn" style="background:green" onclick="setColor('green')">GREEN</button>
  <button class="colorBtn" style="background:yellow" onclick="setColor('yellow')">YELLOW</button>
  <button class="colorBtn" style="background:white" onclick="setColor('white')">WHITE</button>
  <button onclick="backToSettings()">BACK</button>
</div>

<!-- TEXT -->
<div id="textMenu" class="menu hidden">
  <input id="textInput" placeholder="Enter text">
  <button onclick="saveText()">SAVE</button>
  <button onclick="backToSettings()">BACK</button>
</div>

<!-- GAME -->
<canvas id="game" width="400" height="500"></canvas>
<button id="jumpBtn" onclick="jump()">JUMP</button>
<button id="startBtn" onclick="goToMenu()">START</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* SETTINGS */
let settings = {
  shape: "square",
  color: "red",
  text: "SXJ"
};

/* MENU FLOW */
function openSettings(){
  mainMenu.classList.add("hidden");
  settingsMenu.classList.remove("hidden");
}

function backToMain(){
  settingsMenu.classList.add("hidden");
  mainMenu.classList.remove("hidden");
}

function openSub(type){
  settingsMenu.classList.add("hidden");
  document.getElementById(type+"Menu").classList.remove("hidden");
}

function backToSettings(){
  playerMenu.classList.add("hidden");
  colorMenu.classList.add("hidden");
  textMenu.classList.add("hidden");
  settingsMenu.classList.remove("hidden");
}

/* SETTINGS ACTIONS */
function setShape(s){ settings.shape=s; }
function setColor(c){ settings.color=c; }

function saveText(){
  let val = document.getElementById("textInput").value;
  if(val) settings.text = val.toUpperCase();
  backToSettings();
}

/* GAME */
let player, spikes=[], running=false, timer=0;

function startGame(){
  mainMenu.classList.add("hidden");
  canvas.style.display="block";
  jumpBtn.style.display="block";
  startBtn.style.display="none";

  player = {x:50,y:400,vy:0,jumping:false};
  spikes=[];
  running=true;
  timer=0;
}

function goToMenu(){
  canvas.style.display="none";
  jumpBtn.style.display="none";
  startBtn.style.display="none";
  mainMenu.classList.remove("hidden");
}

function jump(){
  if(!player.jumping){
    player.vy=-12;
    player.jumping=true;
  }
}

/* DRAW PLAYER */
function drawPlayer(){
  ctx.fillStyle=settings.color;

  if(settings.shape==="square"){
    ctx.fillRect(player.x,player.y,30,30);
  }

  if(settings.shape==="circle"){
    ctx.beginPath();
    ctx.arc(player.x+15,player.y+15,15,0,Math.PI*2);
    ctx.fill();
  }

  if(settings.shape==="triangle"){
    ctx.beginPath();
    ctx.moveTo(player.x,player.y+30);
    ctx.lineTo(player.x+15,player.y);
    ctx.lineTo(player.x+30,player.y+30);
    ctx.fill();
  }

  if(settings.shape==="heart"){
    ctx.beginPath();
    ctx.moveTo(player.x+15,player.y+30);
    ctx.bezierCurveTo(player.x-10,player.y,player.x+40,player.y,player.x+15,player.y+30);
    ctx.fill();
  }

  ctx.fillStyle="white";
  ctx.fillText(settings.text,player.x,player.y-5);
}

/* LOOP */
function loop(){
  ctx.clearRect(0,0,400,500);

  if(running){

    player.vy+=0.6;
    player.y+=player.vy;

    if(player.y>400){
      player.y=400;
      player.vy=0;
      player.jumping=false;
    }

    timer++;
    if(timer>130){
      spikes.push({x:400});
      timer=0;
    }

    for(let s of spikes){
      s.x-=3;

      ctx.fillStyle="red";
      ctx.beginPath();
      ctx.moveTo(s.x,430);
      ctx.lineTo(s.x+15,400);
      ctx.lineTo(s.x+30,430);
      ctx.fill();

      if(s.x<player.x+30 && s.x+30>player.x && player.y>370){
        running=false;
        startBtn.style.display="block";
      }
    }

    spikes=spikes.filter(s=>s.x>-50);

    drawPlayer();

  } else {
    ctx.fillText("GAME OVER",130,250);
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
