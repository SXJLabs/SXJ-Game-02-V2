<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Runner</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
  color: white;
}

canvas {
  display: none;
  background: black;
}

/* CONTROLS */
#jumpBtn, #shieldBtn, #restartBtn {
  position: fixed;
  z-index: 10;
  padding: 12px 16px;
  border-radius: 10px;
  border: none;
}

#jumpBtn { bottom: 20px; left: 20px; display:none; }
#shieldBtn { bottom: 20px; right: 20px; display:none; }

#restartBtn {
  top: 60%;
  left: 50%;
  transform: translate(-50%,-50%);
  display: none;
  font-size: 18px;
  background: white;
  color: black;
}

/* GAME OVER SCREEN (FIXED BIG CENTER) */
#gameOverScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: rgba(0,0,0,0.7);
  z-index: 20;
}

#gameOverText {
  font-size: 40px;
  margin-bottom: 20px;
}

button {
  padding: 14px 20px;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<canvas id="game" width="400" height="500"></canvas>

<button id="jumpBtn" onclick="jump()">JUMP</button>
<button id="shieldBtn" onclick="shield()">SHIELD</button>

<div id="gameOverScreen">
  <div id="gameOverText">GAME OVER</div>
  <button onclick="restartGame()">RESTART</button>
</div>

<script>

let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let player, objects=[], bullets=[];
let running=false;
let timer=0;
let pattern=0;
let shieldActive=false;
let score=0;

/* AUDIO */
let audioCtx;
function beep(freq,time){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = freq;
  osc.start();
  osc.stop(audioCtx.currentTime + time/1000);
}

/* START */
function startGame(){

  document.getElementById("gameOverScreen").style.display="none";

  canvas.style.display="block";
  document.getElementById("jumpBtn").style.display="block";
  document.getElementById("shieldBtn").style.display="block";

  player={x:50,y:400,vy:0,jumping:false,w:30,h:30,prevY:400};

  objects=[];
  bullets=[];
  timer=0;
  pattern=0;
  score=0;
  running=true;

  beep(600,100);
}

/* RESTART */
function restartGame(){
  startGame();
}

/* CONTROLS */
function jump(){
  if(!player.jumping){
    player.vy=-12;
    player.jumping=true;
    beep(800,80);
  }
}

function shield(){
  shieldActive=true;
  setTimeout(()=>shieldActive=false,1200);
  beep(300,120);
}

/* SPAWN */
function spawn(){
  let t=pattern%5;

  if(t===0) objects.push({type:"spike",x:400});
  if(t===3) objects.push({type:"enemy",x:400,cd:0,name:"BOT",alive:true});

  pattern++;
}

/* HIT */
function hit(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

/* GAME OVER */
function gameOver(){
  running=false;
  document.getElementById("gameOverScreen").style.display="flex";
  beep(150,300);
}

/* LOOP */
function loop(){

ctx.clearRect(0,0,400,500);

if(!player){requestAnimationFrame(loop);return;}

if(running){

  score++;

  player.prevY = player.y;

  player.vy+=0.6;
  player.y+=player.vy;

  if(player.y>400){
    player.y=400;
    player.vy=0;
    player.jumping=false;
  }

  timer++;
  if(timer>120){
    spawn();
    timer=0;
  }

  for(let o of objects){
    o.x-=3;

    if(o.type==="spike"){
      ctx.fillStyle="red";
      ctx.fillRect(o.x,400,30,30);

      if(hit(player,{x:o.x,y:400,w:30,h:30}) && !shieldActive){
        gameOver();
      }
    }

    if(o.type==="enemy" && o.alive){

      ctx.fillStyle="orange";
      ctx.fillRect(o.x,380,30,30);

      ctx.fillStyle="white";
      ctx.fillText(o.name,o.x,370);

      /* 🦶 MARIO STOMP LOGIC */
      let enemyBox = {x:o.x,y:380,w:30,h:30};

      let falling = player.vy > 0;
      let wasAbove = player.prevY + 30 <= enemyBox.y;

      if(hit(player,enemyBox)){

        if(falling && wasAbove){
          // stomp kill
          o.alive = false;
          player.vy = -8; // bounce
          score += 50;
          beep(1000,80);
        } else {
          if(!shieldActive){
            gameOver();
          }
        }
      }
    }
  }

  objects=objects.filter(o=>o.x>-100 && o.alive !== false);

  /* PLAYER */
  ctx.fillStyle="lime";
  ctx.fillRect(player.x,player.y,30,30);

  /* SCORE */
  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("SCORE: " + score,10,30);

}

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
