<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Runner</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
  color: white;
}

/* SCREENS */
.screen {
  position: fixed;
  width: 100%;
  height: 100%;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 12px;
}

/* BUTTONS */
button {
  padding: 14px 20px;
  border: none;
  border-radius: 10px;
}

/* CANVAS */
canvas {
  display: none;
  background: black;
}

/* GAME BUTTONS (INSIDE SCREEN FIX) */
#jumpBtn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  display: none;
  z-index: 10;
}

#shieldBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: none;
  z-index: 10;
}

#startBtn {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  display: none;
  z-index: 10;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="main" class="screen" style="display:flex;">
  <button onclick="startGame()">PLAY</button>
  <button onclick="show('settings')">SETTINGS</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
  <button onclick="show('main')">BACK</button>
</div>

<canvas id="game" width="400" height="500"></canvas>

<button id="jumpBtn" onclick="jump()">JUMP</button>
<button id="shieldBtn" onclick="shield()">SHIELD</button>
<button id="startBtn" onclick="restart()">START</button>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, spikes = [], bullets = [];
let running = false;
let timer = 0;
let pattern = 0;
let shieldActive = false;

/* MENU CONTROL */
function show(id){
  document.getElementById("main").style.display="none";
  document.getElementById("settings").style.display="none";

  if(id){
    document.getElementById(id).style.display="flex";
  }
}

/* START GAME */
function startGame(){
  show("");

  canvas.style.display = "block";
  document.getElementById("jumpBtn").style.display = "block";
  document.getElementById("shieldBtn").style.display = "block";
  document.getElementById("startBtn").style.display = "none";

  player = {x:50,y:400,vy:0,jumping:false,w:30,h:30};

  spikes = [];
  bullets = [];
  timer = 0;
  pattern = 0;
  running = true;
}

/* RESTART */
function restart(){
  canvas.style.display="none";
  document.getElementById("jumpBtn").style.display="none";
  document.getElementById("shieldBtn").style.display="none";
  document.getElementById("startBtn").style.display="none";

  show("main");
}

/* CONTROLS */
function jump(){
  if(!player.jumping){
    player.vy = -12;
    player.jumping = true;
  }
}

function shield(){
  shieldActive = true;
  setTimeout(()=>shieldActive=false, 1200);
}

/* SPAWN PATTERN */
function spawn(){
  let t = pattern % 4;

  if(t === 0) spikes.push({x:400});
  if(t === 1) bullets.push({x:400,y:390,fromEnemy:true});
  if(t === 2) bullets.push({x:420,y:390,fromEnemy:true});
  if(t === 3){
    spikes.push({x:400});
    spikes.push({x:460});
  }

  pattern++;
}

/* COLLISION FIX (REAL HITBOX) */
function hit(a,b){
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

/* LOOP */
function loop(){

  ctx.clearRect(0,0,400,500);

  if(!player){
    requestAnimationFrame(loop);
    return;
  }

  if(running){

    /* GRAVITY */
    player.vy += 0.6;
    player.y += player.vy;

    if(player.y > 400){
      player.y = 400;
      player.vy = 0;
      player.jumping = false;
    }

    /* SPAWN WITH SPACE */
    timer++;
    if(timer > 140){
      spawn();
      timer = 0;
    }

    /* SPIKES */
    for(let s of spikes){
      s.x -= 3;

      let spike = {x:s.x,y:400,w:30,h:30};

      ctx.fillStyle="red";
      ctx.beginPath();
      ctx.moveTo(s.x,430);
      ctx.lineTo(s.x+15,400);
      ctx.lineTo(s.x+30,430);
      ctx.fill();

      if(hit(player,spike) && !shieldActive){
        running = false;
        document.getElementById("startBtn").style.display="block";
      }
    }

    /* BULLETS */
    for(let b of bullets){
      b.x -= 4;

      let bullet = {x:b.x,y:b.y,w:5,h:5};

      ctx.fillStyle="yellow";
      ctx.fillRect(b.x,b.y,5,5);

      if(hit(player,bullet) && !shieldActive){
        running = false;
        document.getElementById("startBtn").style.display="block";
      }
    }

    spikes = spikes.filter(s=>s.x>-100);
    bullets = bullets.filter(b=>b.x>-100);

    /* PLAYER */
    ctx.fillStyle = shieldActive ? "cyan" : "white";
    ctx.fillRect(player.x,player.y,30,30);

  } else {
    ctx.fillStyle="white";
    ctx.fillText("GAME OVER",150,250);
  }

  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
