<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Runner</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

/* SCREENS */
.screen {
  position: fixed;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 15px;
  color: white;
}

/* BUTTONS */
button {
  padding: 14px 22px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

/* CANVAS */
canvas {
  display: none;
  background: black;
}

/* GAME BUTTONS (INSIDE VIEWPORT FIXED) */
#jumpBtn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  display: none;
  z-index: 10;
}

#shieldBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: none;
  z-index: 10;
}

#startBtn {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  display: none;
  z-index: 10;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="main" class="screen" style="display:flex;">
  <button onclick="startGame()">PLAY</button>
  <button onclick="show('settings')">SETTINGS</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
  <button onclick="show('main')">BACK</button>
</div>

<!-- GAME -->
<canvas id="game" width="400" height="500"></canvas>

<button id="jumpBtn" onclick="jump()">JUMP</button>
<button id="shieldBtn" onclick="shield()">SHIELD</button>
<button id="startBtn" onclick="restart()">START</button>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, objects = [], bullets = [];
let running = false;
let timer = 0;
let pattern = 0;
let shieldActive = false;

/* SCREEN SWITCH */
function show(id){
  document.getElementById("main").style.display="none";
  document.getElementById("settings").style.display="none";

  if(id){
    document.getElementById(id).style.display="flex";
  }
}

/* START GAME (FIXED SAFE INIT) */
function startGame(){
  show("");

  canvas.style.display = "block";
  document.getElementById("jumpBtn").style.display = "block";
  document.getElementById("shieldBtn").style.display = "block";
  document.getElementById("startBtn").style.display = "none";

  player = {x:50,y:400,vy:0,jumping:false};

  objects = [];
  bullets = [];
  timer = 0;
  pattern = 0;
  running = true;
}

/* RESTART */
function restart(){
  canvas.style.display="none";
  document.getElementById("jumpBtn").style.display="none";
  document.getElementById("shieldBtn").style.display="none";
  document.getElementById("startBtn").style.display="none";

  show("main");
}

/* CONTROLS */
function jump(){
  if(!player.jumping){
    player.vy = -12;
    player.jumping = true;
  }
}

function shield(){
  shieldActive = true;
  setTimeout(()=>shieldActive=false, 1200);
}

/* PATTERN SYSTEM */
function spawn(){
  let t = pattern % 4;

  if(t === 0) objects.push({t:"spike",x:400});
  if(t === 1) objects.push({t:"enemy",x:400,cd:0});
  if(t === 2) objects.push({t:"enemy",x:400,cd:0});
  if(t === 3){
    objects.push({t:"spike",x:400});
    objects.push({t:"spike",x:460});
  }

  pattern++;
}

/* GAME LOOP (SAFE) */
function loop(){

  ctx.clearRect(0,0,400,500);

  if(!player){
    requestAnimationFrame(loop);
    return;
  }

  if(running){

    player.vy += 0.6;
    player.y += player.vy;

    if(player.y > 400){
      player.y = 400;
      player.vy = 0;
      player.jumping = false;
    }

    timer++;
    if(timer > 140){
      spawn();
      timer = 0;
    }

    for(let o of objects){
      o.x -= 2.5;

      if(o.t === "spike"){
        ctx.fillStyle="red";
        ctx.beginPath();
        ctx.moveTo(o.x,430);
        ctx.lineTo(o.x+15,400);
        ctx.lineTo(o.x+30,430);
        ctx.fill();

        if(o.x < player.x+30 && player.y > 370 && !shieldActive){
          running = false;
          document.getElementById("startBtn").style.display="block";
        }
      }

      if(o.t === "enemy"){
        ctx.fillStyle="orange";
        ctx.fillRect(o.x,380,30,30);

        o.cd++;

        if(o.cd > 90){
          bullets.push({x:o.x,y:400});
          o.cd = 0;
        }
      }
    }

    for(let b of bullets){
      b.x -= 4;

      ctx.fillStyle="yellow";
      ctx.fillRect(b.x,b.y,5,5);

      if(b.x < player.x+30 && player.y > 370 && !shieldActive){
        running = false;
        document.getElementById("startBtn").style.display="block";
      }
    }

    objects = objects.filter(o=>o.x>-100);
    bullets = bullets.filter(b=>b.x>-50);

    ctx.fillStyle = shieldActive ? "cyan" : "white";
    ctx.fillRect(player.x,player.y,30,30);

  } else {
    ctx.fillStyle="white";
    ctx.fillText("GAME OVER",150,250);
  }

  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
