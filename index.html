<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAFE GAME</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

canvas {
  display: block;
  background: black;
}

button {
  position: fixed;
  z-index: 10;
  padding: 14px;
  border-radius: 10px;
  border: none;
}

#jumpBtn { left: 20px; bottom: 20px; }
#shieldBtn { right: 20px; bottom: 20px; }
#startBtn { top: 50%; left: 50%; transform: translate(-50%,-50%); display:none; }
</style>
</head>

<body>

<canvas id="game" width="400" height="500"></canvas>

<button id="jumpBtn">JUMP</button>
<button id="shieldBtn">SHIELD</button>
<button id="startBtn">START</button>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

if(!ctx){
  alert("Canvas failed to load");
}

let player, objects = [], bullets = [];
let running = false;
let shield = false;
let timer = 0;
let pattern = 0;

/* INIT */
function init(){
  player = {x:50,y:400,vy:0,jumping:false};
  objects = [];
  bullets = [];
  timer = 0;
  pattern = 0;
  running = true;
  document.getElementById("startBtn").style.display="none";
}

/* CONTROLS */
document.getElementById("jumpBtn").onclick = function(){
  if(!player.jumping){
    player.vy = -12;
    player.jumping = true;
  }
};

document.getElementById("shieldBtn").onclick = function(){
  shield = true;
  setTimeout(()=>shield=false, 1200);
};

document.getElementById("startBtn").onclick = init;

/* SPAWN */
function spawn(){
  let t = pattern % 4;

  if(t === 0) objects.push({t:"spike",x:400});
  if(t === 1) objects.push({t:"enemy",x:400,cd:0});
  if(t === 2) objects.push({t:"enemy",x:400,cd:0});
  if(t === 3){
    objects.push({t:"spike",x:400});
    objects.push({t:"spike",x:460});
  }

  pattern++;
}

/* LOOP (SAFE GUARDED) */
function loop(){
  try {

    ctx.clearRect(0,0,400,500);

    if(!player){
      requestAnimationFrame(loop);
      return;
    }

    if(running){

      player.vy += 0.6;
      player.y += player.vy;

      if(player.y > 400){
        player.y = 400;
        player.vy = 0;
        player.jumping = false;
      }

      timer++;
      if(timer > 140){
        spawn();
        timer = 0;
      }

      for(let o of objects){
        o.x -= 2.5;

        if(o.t === "spike"){
          ctx.fillStyle="red";
          ctx.beginPath();
          ctx.moveTo(o.x,430);
          ctx.lineTo(o.x+15,400);
          ctx.lineTo(o.x+30,430);
          ctx.fill();

          if(o.x < player.x+30 && player.y > 370 && !shield){
            running = false;
            document.getElementById("startBtn").style.display="block";
          }
        }

        if(o.t === "enemy"){
          ctx.fillStyle="orange";
          ctx.fillRect(o.x,380,30,30);

          o.cd++;

          if(o.cd > 90){
            bullets.push({x:o.x,y:400});
            o.cd = 0;
          }
        }
      }

      for(let b of bullets){
        b.x -= 4;
        ctx.fillStyle="yellow";
        ctx.fillRect(b.x,b.y,5,5);

        if(b.x < player.x+30 && player.y > 370 && !shield){
          running = false;
          document.getElementById("startBtn").style.display="block";
        }
      }

      objects = objects.filter(o=>o.x>-100);
      bullets = bullets.filter(b=>b.x>-50);

      ctx.fillStyle = shield ? "cyan" : "white";
      ctx.fillRect(player.x,player.y,30,30);

    } else {
      ctx.fillStyle="white";
      ctx.fillText("GAME OVER",150,250);
    }

  } catch(e){
    ctx.fillStyle="white";
    ctx.fillText("ERROR: " + e.message, 10, 50);
  }

  requestAnimationFrame(loop);
}

init();
loop();

</script>

</body>
</html>
