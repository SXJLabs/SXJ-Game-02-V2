<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; background:black; color:white; font-family:Arial; overflow:hidden; }

.screen {
  position:fixed;
  width:100%; height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:20px;
}

button {
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
}

/* canvas */
canvas {
  display:none;
  margin:60px auto;
  border:2px solid white;
}

/* jump button */
#jumpBtn {
  position:fixed;
  bottom:30px;
  left:20px;
  display:none;
}

/* start button */
#startBtn {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  display:none;
}

/* colored buttons */
.colorBtn {
  width:120px;
  color:black;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- MAIN -->
<div id="main" class="screen" style="display:flex;">
  <button onclick="startGame()">PLAY</button>
  <button onclick="go('settings')">SETTINGS</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
  <button onclick="go('player')">Change Player</button>
  <button onclick="go('color')">Change Color</button>
  <button onclick="go('text')">Change Text</button>
  <button onclick="go('main')">BACK</button>
</div>

<!-- PLAYER -->
<div id="player" class="screen">
  <button onclick="setShape('square')">Square</button>
  <button onclick="setShape('circle')">Circle</button>
  <button onclick="setShape('triangle')">Triangle</button>
  <button onclick="setShape('heart')">Heart</button>
  <button onclick="go('settings')">BACK</button>
</div>

<!-- COLOR -->
<div id="color" class="screen">
  <button class="colorBtn" style="background:red" onclick="setColor('red')">RED</button>
  <button class="colorBtn" style="background:blue" onclick="setColor('blue')">BLUE</button>
  <button class="colorBtn" style="background:green" onclick="setColor('green')">GREEN</button>
  <button class="colorBtn" style="background:yellow" onclick="setColor('yellow')">YELLOW</button>
  <button class="colorBtn" style="background:white" onclick="setColor('white')">WHITE</button>
  <button onclick="go('settings')">BACK</button>
</div>

<!-- TEXT -->
<div id="text" class="screen">
  <input id="textInput" placeholder="Enter text">
  <button onclick="saveText()">SAVE</button>
  <button onclick="go('settings')">BACK</button>
</div>

<!-- GAME -->
<canvas id="game" width="400" height="500"></canvas>
<button id="jumpBtn" onclick="jump()">JUMP</button>
<button id="startBtn" onclick="restart()">START</button>

<script>
const screens = ["main","settings","player","color","text"];
function go(id){
  screens.forEach(s => document.getElementById(s).style.display="none");
  document.getElementById(id).style.display="flex";
}

/* SETTINGS */
let settings = { shape:"square", color:"red", text:"SXJ" };

function setShape(s){ settings.shape=s; }
function setColor(c){ settings.color=c; }
function saveText(){
  let v=document.getElementById("textInput").value;
  if(v) settings.text=v.toUpperCase();
}

/* GAME */
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let player, spikes=[], running=false, timer=0;

function go(id){
  screens.forEach(s => {
    document.getElementById(s).style.display = "none";
  });

  if(id){
    document.getElementById(id).style.display = "flex";
  }
} function runction restart(){
  canvas.style.display="none";
  jumpBtn.style.display="startBtn startBtn.style.display="nonemain go("main");
}

function jump(){
  if(!player.jumping){
    player.vy=-12;
    player.jumping=true;
  }
}

/* DRAW PLAYER */
function drawPlayer(){
  ctx.fillStyle=settings.color;

  if(settings.shape==="square") ctx.fillRect(player.x,player.y,30,30);

  if(settings.shape==="circle"){
    ctx.beginPath();
    ctx.arc(player.x+15,player.y+15,15,0,Math.PI*2);
    ctx.fill();
  }

  if(settings.shape==="triangle"){
    ctx.beginPath();
    ctx.moveTo(player.x,player.y+30);
    ctx.lineTo(player.x+15,player.y);
    ctx.lineTo(player.x+30,player.y+30);
    ctx.fill();
  }

  if(settings.shape==="heart"){
    ctx.beginPath();
    ctx.moveTo(player.x+15,player.y+30);
    ctx.bezierCurveTo(player.x-10,player.y,player.x+40,player.y,player.x+15,player.y+30);
    ctx.fill();
  }

  ctx.fillStyle="white";
  ctx.fillText(settings.text,player.x,player.y-5);
}

/* LOOP */
function loop(){
  ctx.clearRect(0,0,400,500);

  if(running){
    player.vy+=0.6;
    player.y+=player.vy;

    if(player.y>400){
      player.y=400;
      player.vy=0;
      player.jumping=false;
    }

    timer++;
    if(timer>140){ // GOOD SPACING
      spikes.push({x:400});
      timer=0;
    }

    for(let s of spikes){
      s.x-=3;

      ctx.fillStyle="red";
      ctx.beginPath();
      ctx.moveTo(s.x,430);
      ctx.lineTo(s.x+15,400);
      ctx.lineTo(s.x+30,430);
      ctx.fill();

      if(s.x<player.x+30 && s.x+30>player.x && player.y>370){
        running=false;
        startBtn.style.display="block";
      }
    }

    spikes=spikes.filter(s=>s.x>-50);

    drawPlayer();

  } else {
    ctx.fillText("GAME OVER",130,250);
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
